name: hanan_scanner
description: HananScanner — a premium all-in-one document, QR & barcode scanning suite for Android.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local persistence
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Camera & image handling
  camera: ^0.11.0+1
  image: ^4.1.7
  image_picker: ^1.1.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  syncfusion_flutter_pdfviewer: ^26.2.13

  # QR / Barcode
  mobile_scanner: ^5.1.0
  qr_flutter: ^4.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Sharing & files
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  file_picker: ^8.0.3

  # Ads
  google_mobile_ads: ^5.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material: true
  assets:
    - assets/images/
